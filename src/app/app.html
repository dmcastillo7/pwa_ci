<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-purple text-white text-center">
          <h3 class="mb-0">{{titulo}}</h3>
        </div>
        <div class="card-body">
          <p class="text-muted text-center">Gestor de tareas PWA con persistencia offline</p>
          <div class="alert" [class.alert-success]="estaOnline" [class.alert-danger]="!estaOnline" role="alert">
            Estado de la conexión:
            <strong>{{ estaOnline ? 'En línea' : 'Sin conexión' }}</strong>
          </div>
          <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Ingrese una tarea" [(ngModel)]="nuevaTarea" (keyup.enter)="agregarTarea()">
            <button class="btn btn-purple btn-sm" (click)="agregarTarea()">Agregar Tarea</button>
          </div>
          <ul class="list-group">
            @for(tarea of tareas; track tarea.texto; let i = $index){
            <li class="list-group-item d-flex justify-content-between align-items-center">
              <span role="button" [class.text-decoration-line-through]="tarea.completada"
                [class.text-muted]="tarea.completada" (click)="cambiarEstadoTarea(tarea)">
                {{ tarea.texto }}
              </span>
              <button class="btn btn-danger btn-sm" (click)="eliminarTarea(i)">Eliminar</button>
            </li>
            }
          </ul>
        </div>
        <div class="card-footer text-center text-muted">
          <small>TaskMaster Pro - Laboratorio 5 PWA</small>
        </div>
      </div>
    </div>
  </div>
</div>
